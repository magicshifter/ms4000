name: Docker Build & Publish - MS4000 Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  packages: write

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GHCR (only needed when pushing)
      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
          load: true
          tags: |
            ms4000-firmware-builder:latest
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          build-args: |
            UID=1000
            GID=1000
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify build inside container
        run: |
          echo "=== Running verification inside container ==="

          docker run --rm ms4000-firmware-builder:latest bash -c '
            set -e
            echo "→ Firmware build check:"
            ls -la firmware/.pio/build/ || echo "Warning: No .pio/build folder"
            
            if ls firmware/.pio/build/*/firmware.bin 1> /dev/null 2>&1; then
              echo "✅ firmware.bin successfully built!"
              mkdir -p /tmp/artifacts/firmware
              find firmware/.pio/build/ -name "firmware.bin" -exec cp {} /tmp/artifacts/firmware/ \;
            else
              echo "❌ firmware.bin not found!"
              exit 1
            fi

            echo "→ Webapp build check:"
            if [ -d "web/app/dist" ]; then
              echo "✅ Webapp dist folder found!"
              mkdir -p /tmp/artifacts/web
              cp -r web/app/dist /tmp/artifacts/web/
            else
              echo "Warning: web/app/dist not found"
            fi

            echo "=== All verification steps passed ==="
          '

      - name: Extract artifacts from container
        run: |
          # Copy artifacts out (this works because we used --rm earlier, but files are copied now)
          docker create --name temp-extractor ms4000-firmware-builder:latest
          docker cp temp-extractor:/tmp/artifacts ./artifacts || echo "No artifacts directory (some builds may skip)"
          docker rm temp-extractor

      - name: Upload firmware.bin artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bin
          path: ./artifacts/firmware/firmware.bin
          if-no-files-found: warn
          retention-days: 30

      - name: Upload webapp build artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-dist
          path: ./artifacts/web/dist
          if-no-files-found: warn
          retention-days: 30

      - name: Build summary
        if: always()
        run: |
          echo "Docker Build Summary for ${{ github.repository }}"
          echo "Commit SHA: ${{ github.sha }}"
          if [[ "${{ github.event_name }}" == "push" && ("${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/master") ]]; then
            echo "✅ Image pushed to GHCR:"
            echo "   ghcr.io/${{ github.repository }}:latest"
            echo "   ghcr.io/${{ github.repository }}:${{ github.sha }}"
          else
            echo "✅ Build & verification completed on PR (no push)"
          fi
